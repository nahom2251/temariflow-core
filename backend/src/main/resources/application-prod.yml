spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          ssl:
            trust: ${MAIL_SMTP_SSL_TRUST:*}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        debug: ${MAIL_DEBUG:false}
app:
  mail:
    from: ${MAIL_FROM:noreply@temariflow.com}
    from-name: ${MAIL_FROM_NAME:TemariFlow}
server:
  forward-headers-strategy: framework
  compression:
    enabled: true
logging:
  level:
    root: WARN
    com.temariflow: INFO
    org.hibernate.SQL: WARN
