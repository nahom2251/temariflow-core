spring:
  application:
    name: temariflow-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/temariflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          ssl:
            trust: ${MAIL_SMTP_SSL_TRUST:*}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        debug: ${MAIL_DEBUG:false}
server:
  port: ${PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  storage:
    path: ${STORAGE_PATH:./storage}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:noreply@temariflow.com}
    from-name: ${MAIL_FROM_NAME:TemariFlow}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
logging:
  level:
    com.temariflow: ${LOG_LEVEL:INFO}
    com.temariflow.service.EmailService: DEBUG
    org.springframework.mail: ${MAIL_LOG_LEVEL:INFO}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
