spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
server:
  forward-headers-strategy: framework
  compression:
    enabled: true
logging:
  level:
    root: WARN
    com.temariflow: INFO
    org.hibernate.SQL: WARN
