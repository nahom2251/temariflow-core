spring:
  application:
    name: temariflow-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/temariflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: ${PORT:8080}
app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
logging:
  level:
    com.temariflow: INFO
springdoc:
  swagger-ui:
    path: /swagger-ui.html
